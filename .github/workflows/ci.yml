name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI deps
        # 用 requirements-ci.txt 而非 pip install -e ".[dev]", install < 30s
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install package (no deps)
        # 装项目包但跳过 dependencies (已被 requirements-ci.txt 装好),
        # 避免 pip solver 重复解 20+ 个包导致 timeout
        run: pip install --no-deps -e .

      - name: Ruff lint
        run: ruff check scripts/ --ignore E501 --line-length 100

      - name: MCP schema check
        run: python scripts/mcp_schema_check.py

      - name: Docker-compose validation
        run: python scripts/ci_verify.py --docker-check

  # ── 测试分组 ─────────────────────────────────────────────────────────
  test-batch-1:
    name: Tests batch 1/3 (core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install --no-deps -e .
      - name: Run core tests
        id: run_core_tests
        run: |
          set -o pipefail
          pytest tests/test_llm_reviewer.py tests/test_modern_did.py \
            tests/test_checkpoint.py tests/test_event_monitor.py \
            tests/test_llm_gateway.py tests/test_session.py \
            tests/test_tool_selector.py \
            --cov=scripts --cov-append --tb=long --timeout=60 --maxfail=10 -rfE \
            -v 2>&1 | tee pytest-batch1.log
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-batch1-log
          path: pytest-batch1.log
          retention-days: 7
      - name: Append fail log to issue tracker
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'NO LOG';
            try {
              const raw = fs.readFileSync('pytest-batch1.log', 'utf-8');
              // Only keep last 200 lines
              const lines = raw.split('\n');
              log = lines.slice(-200).join('\n');
            } catch (e) { log = 'LOG READ ERR: ' + e.message; }
            // 60KB step summary safe limit
            log = log.slice(-30000);
            const body = [
              '### batch 1 fail @ ' + context.sha.slice(0,7),
              '',
              '`' + (process.env.RUN_URL || 'no-url') + '`',
              '',
              '```',
              log,
              '```',
            ].join('\n');
            const title = '[CI BATCH 1] ' + (context.sha || '').slice(0,7) + ' ' + new Date().toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-fail-log',
              state: 'open',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-fail-log'],
              });
            }
      - name: Publish fail log to ci-debug branch
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git ls-remote --heads origin ci-debug | grep -q ci-debug; then
            git fetch origin ci-debug
            git checkout -B ci-debug origin/ci-debug
            git rebase origin/main || true
          else
            git checkout -b ci-debug origin/main
          fi
          mkdir -p .ci-fail-logs
          cp pytest-batch1.log .ci-fail-logs/batch1-${GITHUB_SHA:0:7}.log
          echo "### batch 1 fail at ${GITHUB_SHA:0:7}" >> .ci-fail-logs/INDEX.md
          echo "- ${{ github.workflow }} #${{ github.run_number }} ($(date -u +%FT%TZ))" >> .ci-fail-logs/INDEX.md
          echo "" >> .ci-fail-logs/INDEX.md
          git add .ci-fail-logs/
          git commit -m "ci: batch 1 fail log @ ${GITHUB_SHA:0:7}" || true
          echo "=== git push start ==="
          set -x
          git push -f origin ci-debug
          set +x
          echo "=== git push end ==="
      - name: Surface fail reason via step summary
        if: failure()
        run: |
          echo "## batch 1 fail" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 80 pytest-batch1.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

