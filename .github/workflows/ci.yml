name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt --quiet 2>/dev/null || true
      - name: Lint with ruff
        run: ruff check scripts/ --ignore E501 --max-line-length 100

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r requirements.txt --quiet 2>/dev/null || true
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DEEPSEEK_API_KEY: dummy_key_for_tests
          RELAY_API_KEY: dummy_key_for_tests

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build MCP server image
        run: |
          docker build -t finresearch/mcp-financial:test \
            -f mcp_servers/user_financial/Dockerfile \
            mcp_servers/user_financial/
      - name: Test container starts
        run: docker run --rm finresearch/mcp-financial:test python -c "import sys; sys.exit(0)"
