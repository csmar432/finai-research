name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI deps
        # 用 requirements-ci.txt 而非 pip install -e ".[dev]", install < 30s
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install package (no deps)
        # 装项目包但跳过 dependencies (已被 requirements-ci.txt 装好),
        # 避免 pip solver 重复解 20+ 个包导致 timeout
        run: pip install --no-deps -e .

      - name: Ruff lint
        run: ruff check scripts/ --ignore E501 --line-length 100

      - name: MCP schema check
        run: python scripts/mcp_schema_check.py

      - name: Docker-compose validation
        run: python scripts/ci_verify.py --docker-check

  # ── 测试分组 ─────────────────────────────────────────────────────────
  test-batch-1:
    name: Tests batch 1/3 (core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install --no-deps -e .
      - name: Run core tests
        run: |
          set +e
          pytest tests/test_llm_reviewer.py tests/test_modern_did.py \
            tests/test_checkpoint.py tests/test_event_monitor.py \
            tests/test_llm_gateway.py tests/test_session.py \
            tests/test_tool_selector.py \
            --cov=scripts --cov-append -x --tb=long --timeout=60 \
            -v 2>&1 | tee pytest-batch1.log
          echo "=== Exit: ${PIPESTATUS[0]} ==="
          echo "=== Last 200 lines of log: ==="
          tail -n 200 pytest-batch1.log || true
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-batch1-log
          path: pytest-batch1.log
          retention-days: 7

  test-batch-2:
    name: Tests batch 2/3 (orchestrator)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install --no-deps -e .
      - name: Run orchestrator tests
        run: |
          set +e
          pytest tests/test_analyst_agents.py tests/test_ai_router.py \
            tests/test_halt_rules.py \
            tests/test_halt_rules_registry.py tests/test_citation_verifier.py \
            tests/test_agent_loader.py tests/test_data_cache.py \
            --cov=scripts --cov-append -x --tb=long --timeout=60 \
            -v 2>&1 | tee pytest-batch2.log
          echo "=== Exit: ${PIPESTATUS[0]} ==="
          tail -n 200 pytest-batch2.log || true
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-batch2-log
          path: pytest-batch2.log
          retention-days: 7

  test-batch-3:
    name: Tests batch 3/3 (econometrics)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install --no-deps -e .
      - name: Run econometrics tests
        run: |
          set +e
          pytest tests/test_econometrics_rules.py tests/test_interactive_fixed_effects.py \
            tests/test_panel_quantile_regression.py tests/test_local_projections_did.py \
            tests/test_journal_template.py tests/test_memory.py \
            tests/test_mcp_tool_market.py tests/test_rdd.py \
            tests/test_report_generator.py tests/test_research_framework.py \
            tests/test_reviewer_calibration.py tests/test_spatial_regression.py \
            tests/test_synthetic_control.py tests/test_synthetic_did.py \
            tests/test_triple_diff_did.py tests/test_latex_lint.py \
            tests/test_ollama_provider.py tests/test_project_config.py \
            tests/test_diagnostic_advanced.py tests/test_demo_research_report.py \
            --cov=scripts --cov-append -x --tb=long --timeout=60 \
            -v 2>&1 | tee pytest-batch3.log
          echo "=== Exit: ${PIPESTATUS[0]} ==="
          tail -n 200 pytest-batch3.log || true
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-batch3-log
          path: pytest-batch3.log
          retention-days: 7

  cross-platform:
    name: Cross-platform smoke test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install --no-deps -e .
      - name: Cross-platform sanity check
        run: |
          python -c "from scripts.core.checkpoint import _HAS_FCNTL, CheckpointManager; print('CheckpointManager loaded, fcntl=', _HAS_FCNTL)"
          python -c "import importlib; mod = importlib.import_module('scripts.event_monitor'); print('event_monitor loaded')"
        shell: bash
      - name: Run subset tests
        run: |
          set +e
          pytest tests/test_checkpoint.py tests/test_event_monitor.py --tb=long -v 2>&1 | tee pytest-cs.log
          echo "=== Exit: ${PIPESTATUS[0]} ==="
          tail -n 100 pytest-cs.log || true
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cs-${{ matrix.os }}-log
          path: pytest-cs.log
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        run: docker build -t finai-research-workflow:test .
