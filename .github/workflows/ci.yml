  cross-platform:
    name: Cross-platform smoke test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install --no-deps -e .
      - name: Cross-platform sanity check
        run: |
          python -c "from scripts.core.checkpoint import CheckpointManager; print('CheckpointManager loaded:', CheckpointManager)"
          python -c "import importlib; mod = importlib.import_module('scripts.event_monitor'); print('event_monitor loaded:', mod)"
          python -c "from scripts.core.ide_platform import get_platform_info; print('platform:', get_platform_info())"
        shell: bash
      - name: Run subset tests
        run: |
          set -o pipefail
          pytest tests/test_checkpoint.py tests/test_event_monitor.py --tb=long -v 2>&1 | tee pytest-cs.log
        env:
          DEEPSEEK_API_KEY: dummy_key
          RELAY_API_KEY: dummy_key
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cs-${{ matrix.os }}-log
          path: pytest-cs.log
          retention-days: 7
      - name: Append fail log to issue tracker
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'NO LOG';
            try {
              const raw = fs.readFileSync('pytest-cs.log', 'utf-8');
              const lines = raw.split('\n');
              log = lines.slice(-200).join('\n');
            } catch (e) { log = 'LOG READ ERR: ' + e.message; }
            log = log.slice(-30000);
            const body = [
              '### cs (' + process.env.MATRIX_OS + ') fail @ ' + context.sha.slice(0,7),
              '',
              '```',
              log,
              '```',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-fail-log',
              state: 'open',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[CI CS] ' + (context.sha || '').slice(0,7),
                body: body,
                labels: ['ci-fail-log'],
              });
            }
        env:
          MATRIX_OS: ${{ matrix.os }}
      - name: Publish fail log to ci-debug branch
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git ls-remote --heads origin ci-debug | grep -q ci-debug; then
            git fetch origin ci-debug
            git checkout -B ci-debug origin/ci-debug
            git rebase origin/main || true
          else
            git checkout -b ci-debug origin/main
          fi
          mkdir -p .ci-fail-logs
          cp pytest-cs.log .ci-fail-logs/cs-${{ matrix.os }}-${GITHUB_SHA:0:7}.log
          echo "### cs (${{ matrix.os }}) fail at ${GITHUB_SHA:0:7}" >> .ci-fail-logs/INDEX.md
          echo "- ${{ github.workflow }} #${{ github.run_number }} ($(date -u +%FT%TZ))" >> .ci-fail-logs/INDEX.md
          echo "" >> .ci-fail-logs/INDEX.md
          git add .ci-fail-logs/
          git commit -m "ci: cs (${{ matrix.os }}) fail log @ ${GITHUB_SHA:0:7}" || true
          git push -f origin ci-debug 2>&1 | tail -5 || true
      - name: Surface fail reason via step summary
        if: failure()
        run: |
          echo "## cs (${{ matrix.os }}) fail" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 60 pytest-cs.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        run: docker build -t finai-research-workflow:test .
