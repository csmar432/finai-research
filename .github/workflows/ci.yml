        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'NO LOG';
            try {
              const raw = fs.readFileSync('pytest-cs.log', 'utf-8');
              const lines = raw.split('\n');
              log = lines.slice(-200).join('\n');
            } catch (e) { log = 'LOG READ ERR: ' + e.message; }
            log = log.slice(-30000);
            const body = [
              '### cs (' + process.env.MATRIX_OS + ') fail @ ' + context.sha.slice(0,7),
              '',
              '```',
              log,
              '```',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-fail-log',
              state: 'open',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[CI CS] ' + (context.sha || '').slice(0,7),
                body: body,
                labels: ['ci-fail-log'],
              });
            }
        env:
          MATRIX_OS: ${{ matrix.os }}
      - name: Publish fail log to ci-debug branch
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git ls-remote --heads origin ci-debug | grep -q ci-debug; then
            git fetch origin ci-debug
            git checkout -B ci-debug origin/ci-debug
            git rebase origin/main || true
          else
            git checkout -b ci-debug origin/main
          fi
          mkdir -p .ci-fail-logs
          if [ -f pytest-cs.log ]; then
            cp pytest-cs.log .ci-fail-logs/cs-${{ matrix.os }}-${GITHUB_SHA:0:7}.log
          fi
          echo "### cs (${{ matrix.os }}) fail at ${GITHUB_SHA:0:7}" >> .ci-fail-logs/INDEX.md
          echo "- ${{ github.workflow }} #${{ github.run_number }} ($(date -u +%FT%TZ))" >> .ci-fail-logs/INDEX.md
          echo "" >> .ci-fail-logs/INDEX.md
          git add .ci-fail-logs/
          git commit -m "ci: cs (${{ matrix.os }}) fail log @ ${GITHUB_SHA:0:7}" || true
          git push -f origin ci-debug 2>&1 | tail -5 || true
      - name: Surface fail reason via step summary
        if: failure()
        run: |
          echo "## cs (${{ matrix.os }}) fail" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f pytest-cs.log ]; then
            tail -n 60 pytest-cs.log >> $GITHUB_STEP_SUMMARY
          else
            echo "pytest-cs.log not found — pytest may not have run (install step failed?)" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && false  # disabled: requires docker on macOS CI agent
    # TODO: re-enable once docker/build-push-action v5 + self-hosted runner available
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        run: docker build -t finai-research-workflow:test .

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-batch-1, test-batch-2, test-batch-3]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - name: Skip when any test failed
        if: needs.test-batch-1.result != 'success' || needs.test-batch-2.result != 'success' || needs.test-batch-3.result != 'success'
        run: |
          echo "::warning::Skipping coverage upload because at least one test batch did not succeed:"
          echo "  batch 1: ${{ needs.test-batch-1.result }}"
          echo "  batch 2: ${{ needs.test-batch-2.result }}"
          echo "  batch 3: ${{ needs.test-batch-3.result }}"

      # Explicit per-artifact download (avoids pattern-glob issues in PR runs).
      # Download each batch only if that batch succeeded; combine whatever is available.
      # This fixes the prior overly-strict condition requiring ALL 3 batches to succeed.
      - name: Download coverage-batch1
        if: needs.test-batch-1.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: coverage-batch1
          path: coverage-data/batch1
      - name: Download coverage-batch2
        if: needs.test-batch-2.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: coverage-batch2
          path: coverage-data/batch2
      - name: Download coverage-batch3
        if: needs.test-batch-3.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: coverage-batch3
          path: coverage-data/batch3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install coverage reporter
        run: pip install coverage[toml]
      - name: Combine coverage reports
        id: combine
        run: |
          set -x
          ls -la coverage-data/ || true
          ls -la coverage-data/batch1/ coverage-data/batch2/ coverage-data/batch3/ 2>&1 || true
          # Build coverage combine command from available artifacts
          COV_FILES=""
          for batch in batch1 batch2 batch3; do
            if [ -f "coverage-data/$batch/.coverage" ]; then
              COV_FILES="$COV_FILES coverage-data/$batch/.coverage"
            fi
          done
          echo "Combining: $COV_FILES"
          if [ -n "$COV_FILES" ]; then
            coverage combine --keep $COV_FILES
            # Aggregate coverage: scripts/ is 60K+ lines, tests cover targeted modules.
            # Set fail-under=3 as a minimum quality bar.
            coverage report -m --fail-under=3
          else
            echo "No coverage data available — skipping combine"
          fi
      - name: Upload to Codecov
        if: needs.test-batch-1.result == 'success' || needs.test-batch-2.result == 'success' || needs.test-batch-3.result == 'success'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./.coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Append coverage fail log to issue tracker
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let listing = '';
            try {
              const { execSync } = require('child_process');
              listing = execSync(
                'echo "=== workspace ==="; ls -la; ' +
                'echo "=== coverage-data ==="; ls -laR coverage-data/ 2>&1 || true; ' +
                'echo "=== find .coverage ==="; find . -name ".coverage*" -maxdepth 4 2>&1 || true',
                { encoding: 'utf-8' }
              );
            } catch (e) { listing = 'ls err: ' + e.message; }
            const body = [
              '### coverage fail @ ' + context.sha.slice(0,7),
              '',
              '```',
              listing.slice(0, 5000),
              '```',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-fail-log',
              state: 'open',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[CI COVERAGE] ' + (context.sha || '').slice(0,7),
                body: body,
                labels: ['ci-fail-log'],
              });
            }
