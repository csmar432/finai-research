name: Release Drafter

on:
  # Only run on PRs (draft release notes for the next release) and manual trigger
  # Do NOT run on push to main — that would create a release with tag "main" which conflicts
  # with the project's proper semantic-versioned tags (v1.0.0, v1.0.1, etc.)
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-drafter
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-name: release-drafter.yml
          # Always create draft (don't auto-publish); maintainer publishes manually
          publish: false
