name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 最小权限: 减少 token scope, 符合 GitHub security hardening
permissions:
  contents: read

# 注: GitHub Pages 部署需要仓库有 Pages 启用 + 特定权限。
# 本 workflow 仅做 mkdocs build 校验, 部署由 GitHub UI 手动触发或
# 单独的 deploy workflow 处理。

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mkdocs + plugins
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings-python
          pip install -e ".[dev]"
      - name: Build mkdocs
        # 不加 --strict: 项目 docs/ 中存在指向仓库根目录文档
        # (USAGE_GUIDE.md / SETUP_GUIDE.md) 的相对链接, mkdocs 视为 broken。
        # 这些链接在 GitHub 仓库中可正常跳转, 仅是 mkdocs 的 markdown 文件集不同。
        run: mkdocs build -f mkdocs.yml
      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: mkdocs-site
          path: site
          retention-days: 7
