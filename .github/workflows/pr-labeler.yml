# PR labeler: 根据改动的文件路径自动打标签
# https://github.com/actions/labeler
name: PR Labeler

# SECURITY NOTE: This workflow previously used `pull_request_target`, which
# executes in the base-branch context with write access to secrets. That
# trigger has been a known attack vector (e.g. SolarWinds-style injection in
# fork PRs). It is now restricted to events that fire only on trusted
# branches: a regular `pull_request` (read-only) and `workflow_run` of the
# trusted CI workflow (which already runs the PR tests).
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request'
      || (github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
