  </text>

  <rect x="905" y="152" width="80" height="22" rx="11" fill="#0a2e0a" opacity="0.8"/>
  <text x="945" y="167" font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#4ade80" text-anchor="middle">
    18+ Stars
  </text>

  <!-- GitHub star -->
  <text x="1140" y="140"
        font-family="'SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="48" font-weight="800" fill="#e8f4fd" text-anchor="middle">
    ?
  </text>
</svg>
