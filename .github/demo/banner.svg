  </text>
  <text x="970" y="130"
        font-family="'SF Pro Text','Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="11" fill="#5ba8c8">
    AI Tools Supported
  </text>

  <!-- Bottom pill badges -->
  <rect x="660" y="152" width="70" height="22" rx="11" fill="#0a4a4a" opacity="0.8"/>
  <text x="695" y="167" font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#4ade80" text-anchor="middle">
    Python
  </text>

  <rect x="740" y="152" width="85" height="22" rx="11" fill="#1a1f3e" opacity="0.8"/>
  <text x="782" y="167" font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#60a5fa" text-anchor="middle">
    Cursor/Claude
  </text>

  <rect x="835" y="152" width="58" height="22" rx="11" fill="#1a0f2e" opacity="0.8"/>
  <text x="864" y="167" font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#c084fc" text-anchor="middle">
