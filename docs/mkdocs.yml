# mkdocs.yml — Documentation site configuration
# Built with Material for MkDocs

site_name: FinResearch Agent 文档
site_description: 经济金融领域 AI 学术研究工作流文档
site_author: FinAI Research Workflow Contributors
site_url: https://csmar432.github.io/finai-research

repo_name: csmar432/finai-research
repo_url: https://github.com/csmar432/finai-research
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - en
        - zh
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - pymdownx.mark
  - pymdownx.keys

nav:
  - Home: index.md
  - 快速入门:
      - 教程总览: tutorials/README.md
      - 安装配置: tutorials/01-quickstart.md
      - 金融研究报告: tutorials/02-financial-report.md
      - 研究方向设计: tutorials/03-research-directions.md
  - MCP 工具:
      - MCP 市场: tutorials/04-mcp-marketplace.md
      - 数据源参考: external_data_sources.md
      - MCP 分层: MCP_SERVER_TIERING.md
  - 进阶:
      - 事件驱动研究: tutorials/05-event-driven-research.md
      - API 参考: api_reference.md
  - 项目:
      - 架构设计: ARCHITECTURE.md
      - 改进路线: IMPROVEMENT_ROADMAP.md
      - 数据溯源: MOCK_DATA_POLICY.md
      - 安装部署: DOCKER_INSTALL.md
      - 审计工作流: audit-workflow.md
      - 引用指南: CITATION_GUIDE.md
