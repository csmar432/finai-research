  # ── Core LLM Gateway ─────────────────────────────────────────────────────────

  llm_gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: llm_gateway
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - RELAY_API_KEY=${RELAY_API_KEY:-}
      - MCP_SERVER_URL=http://mcp_eastmoney_reports:8001
    env_file:
      - .env
    depends_on:
      mcp_eastmoney_reports:
        condition: service_started
      mcp_financial:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

  # ── SSE Streaming API ─────────────────────────────────────────────────────────

  sse_api:
    build:
      context: .
      dockerfile: Dockerfile.sse
    container_name: sse_api
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_GATEWAY_URL=http://llm_gateway:8000
    depends_on:
      llm_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

  # ── Dashboard ────────────────────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: dashboard
    ports:
      - "8050:8050"
    environment:
      - LLM_GATEWAY_URL=http://llm_gateway:8000
      - SSE_API_URL=http://sse_api:8501
    depends_on:
      llm_gateway:
        condition: service_healthy
      sse_api:
        condition: service_healthy
    restart: on-failure

