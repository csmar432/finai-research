version: '3.9'

services:
  # ── MCP Data Servers (Core — always running) ───────────────────────────────────

  mcp_eastmoney_reports:
    build:
      context: ./mcp_servers/user_eastmoney_reports
      dockerfile: Dockerfile
    container_name: mcp_eastmoney_reports
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

